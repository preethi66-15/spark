<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      padding-right: 2.75rem;
    }
    .password-toggle {
      position: absolute;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }
    .password-toggle:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body class="auth-page">

  <!-- Glow Orbs -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="glass-card auth-card animate-slide-up" style="max-width: 480px;">
    <div class="auth-header">
      <div class="auth-logo"><span class="gradient-text">Spark ✨</span></div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join us to start your personalized skin &amp; hair care advisory</p>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="👤 e.g., Preethi Rudra" required>
      </div>

      <div class="form-group">
        <label for="age" class="form-label">Age</label>
        <input type="number" id="age" class="form-input" placeholder="🎂 e.g., 22" min="13" max="120" required>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="📧 e.g., preethi@domain.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-input" placeholder="🔒 Enter secure password" minlength="6" required>
          <button type="button" id="password-toggle" class="password-toggle" title="Toggle password visibility">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password" class="form-label">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm-password" class="form-input" placeholder="🔒 Confirm secure password" minlength="6" required>
          <button type="button" id="confirm-password-toggle" class="password-toggle" title="Toggle password visibility">👁️</button>
        </div>
        <div class="form-error id-error hidden" id="password-match-error">Passwords do not match</div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="register-submit-btn">
        <span>✨</span> Register &amp; Start
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html" id="login-redirect-link">Login Here</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
