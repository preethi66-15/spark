<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Rate Us</title>
    <meta name="description" content="Rate your experience with Spark and help us improve our skin analysis platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== Rating Page Specific Styles ===== */

        .rating-page-wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* --- Header --- */
        .rating-header {
            text-align: center;
        }

        .rating-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .rating-header p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 1rem;
            font-weight: 400;
        }

        /* --- Glass Card --- */
        .rating-glass-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .rating-glass-card:hover {
            border-color: rgba(124, 58, 237, 0.2);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.06);
        }

        /* --- Star Rating --- */
        #star-rating {
            display: flex;
            gap: 0.6rem;
            user-select: none;
        }

        .star {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease, text-shadow 0.2s ease;
            line-height: 1;
        }

        .star:hover {
            transform: scale(1.18);
        }

        .star.hovered {
            color: #f59e0b;
            text-shadow: 0 0 14px rgba(245, 158, 11, 0.45);
        }

        .star.selected {
            color: #f59e0b;
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.35);
        }

        .star.selected.pulse {
            animation: starPulse 0.35s ease;
        }

        @keyframes starPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* --- Rating Text --- */
        #rating-text {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            text-align: center;
            min-height: 1.4em;
            transition: color 0.3s ease;
        }

        #rating-text.has-rating {
            color: #f59e0b;
        }

        /* --- Textarea --- */
        #feedback-text {
            width: 100%;
            min-height: 110px;
            padding: 1rem 1.15rem;
            border-radius: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #feedback-text::placeholder {
            color: rgba(255, 255, 255, 0.28);
        }

        #feedback-text:focus {
            border-color: rgba(124, 58, 237, 0.45);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        /* --- Submit Button --- */
        #submit-rating {
            width: 100%;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            background: #7c3aed;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        #submit-rating:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #submit-rating:not(:disabled):hover {
            box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
            transform: translateY(-1px);
        }

        #submit-rating:not(:disabled):active {
            transform: translateY(0);
        }

        #submit-rating .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        #submit-rating.loading .btn-label { display: none; }
        #submit-rating.loading .btn-spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Thank You Card --- */
        #thank-you-card {
            display: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 1.25rem;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 2.5rem 2rem;
            text-align: center;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        #thank-you-card.visible {
            display: flex;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            0%   { opacity: 0; transform: scale(0.7); }
            100% { opacity: 1; transform: scale(1); }
        }

        .thank-you-emoji {
            font-size: 3.5rem;
            line-height: 1;
            animation: celebBounce 0.6s ease 0.3s both;
        }

        @keyframes celebBounce {
            0%   { transform: scale(0); }
            60%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .thank-you-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .thank-you-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .thank-you-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.75rem;
            color: #7c3aed;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .thank-you-link:hover {
            color: #06b6d4;
        }

        /* --- Existing Rating Section --- */
        #existing-rating {
            display: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 1.25rem;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 2rem 2rem;
            text-align: center;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        #existing-rating.visible {
            display: flex;
            animation: scaleIn 0.4s ease;
        }

        .existing-rating-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .existing-stars {
            display: flex;
            gap: 0.35rem;
            font-size: 2rem;
            color: #f59e0b;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        .existing-feedback-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-style: italic;
            line-height: 1.5;
            max-width: 100%;
            word-break: break-word;
        }

        .update-rating-btn {
            padding: 0.6rem 1.4rem;
            border: 1px solid rgba(124, 58, 237, 0.35);
            border-radius: 0.6rem;
            background: transparent;
            color: #7c3aed;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .update-rating-btn:hover {
            background: rgba(124, 58, 237, 0.1);
            border-color: #7c3aed;
        }

        /* --- Confetti --- */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            opacity: 0;
            animation: confettiFall var(--fall-duration, 3s) ease-out forwards;
            animation-delay: var(--delay, 0s);
        }

        .confetti-piece.circle {
            border-radius: 50%;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) translateX(var(--drift, 0px)) rotate(var(--spin, 720deg)) scale(0.4);
            }
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .rating-page-wrapper {
                padding: 1.5rem 1rem 3rem;
            }

            .rating-header h1 {
                font-size: 1.75rem;
            }

            .rating-glass-card {
                padding: 2rem 1.25rem;
            }

            .star {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
<body>
    <aside id="sidebar"></aside>

    <main class="main-content" id="main-content">
        <div class="rating-page-wrapper">

            <!-- Header -->
            <div class="rating-header">
                <h1 id="rating-page-title">⭐ Rate Your Experience</h1>
                <p id="rating-page-subtitle">Your feedback helps us improve Spark</p>
            </div>

            <!-- Rating Form Card -->
            <div class="rating-glass-card" id="rating-form-card">
                <!-- Star Rating -->
                <div id="star-rating">
                    <span class="star" data-value="1" id="star-1" role="button" aria-label="Rate 1 star">★</span>
                    <span class="star" data-value="2" id="star-2" role="button" aria-label="Rate 2 stars">★</span>
                    <span class="star" data-value="3" id="star-3" role="button" aria-label="Rate 3 stars">★</span>
                    <span class="star" data-value="4" id="star-4" role="button" aria-label="Rate 4 stars">★</span>
                    <span class="star" data-value="5" id="star-5" role="button" aria-label="Rate 5 stars">★</span>
                </div>

                <!-- Rating Text -->
                <p id="rating-text">Select a rating</p>

                <!-- Feedback Textarea -->
                <textarea
                    id="feedback-text"
                    placeholder="Share your experience with Spark... (optional)"
                    maxlength="500"
                    aria-label="Feedback text"
                ></textarea>

                <!-- Submit Button -->
                <button id="submit-rating" disabled aria-label="Submit your rating">
                    <span class="btn-label">Submit Rating</span>
                    <span class="btn-spinner"></span>
                </button>
            </div>

            <!-- Thank You Card (hidden) -->
            <div id="thank-you-card" aria-live="polite">
                <span class="thank-you-emoji">🎊</span>
                <h2 class="thank-you-title" id="thank-you-title">Thank you for your feedback! 🎉</h2>
                <p class="thank-you-subtitle" id="thank-you-subtitle">Your rating helps us make Spark better for everyone.</p>
                <a href="dashboard.html" class="thank-you-link" id="thank-you-dashboard-link">← Back to Dashboard</a>
            </div>

            <!-- Existing Rating Section (hidden) -->
            <div id="existing-rating" aria-live="polite">
                <p class="existing-rating-label" id="existing-rating-label">You already rated Spark</p>
                <div class="existing-stars" id="existing-stars"></div>
                <p class="existing-feedback-text" id="existing-feedback-display"></p>
                <button class="update-rating-btn" id="update-rating-btn" aria-label="Update your rating">Update Rating</button>
            </div>

        </div>
    </main>

    <!-- Confetti Container -->
    <div id="confetti-container"></div>

    <script src="js/app.js"></script>
    <script src="js/rating.js"></script>
</body>
</html>
