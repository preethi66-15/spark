<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark - Admin Dashboard</title>
    <meta name="description" content="Spark Admin Dashboard — System overview and user management panel">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── Admin-specific overrides ── */
        .admin-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .admin-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.35rem;
            letter-spacing: -0.5px;
        }

        .admin-header p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 1.05rem;
            font-weight: 400;
        }

        /* ── Stats row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.18);
        }

        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.55rem;
            display: block;
        }

        .stat-card .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.06), rgba(6, 182, 212, 0.06));
            pointer-events: none;
        }

        /* ── Section titles ── */
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.45rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.3em;
            border-radius: 4px;
            background: linear-gradient(180deg, #7c3aed, #06b6d4);
        }

        /* ── Search bar ── */
        .search-wrapper {
            position: relative;
            max-width: 400px;
            margin-bottom: 1.25rem;
        }

        .search-wrapper .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 1rem;
            pointer-events: none;
        }

        .search-wrapper input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.6rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .search-wrapper input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        /* ── Data table ── */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            margin-bottom: 3rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }

        .data-table thead th {
            text-align: left;
            padding: 0.85rem 1rem;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.45);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.02);
        }

        .data-table tbody tr {
            transition: background 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(124, 58, 237, 0.06);
        }

        .data-table tbody td {
            padding: 0.8rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            white-space: nowrap;
        }

        .data-table tbody td:first-child {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 500;
        }

        /* ── Ratings grid ── */
        .ratings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .rating-card {
            padding: 1.35rem;
            border-left: 3px solid transparent;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .rating-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .rating-card.rating-high {
            border-left-color: #10b981;
        }

        .rating-card.rating-mid {
            border-left-color: #f59e0b;
        }

        .rating-card.rating-low {
            border-left-color: #ef4444;
        }

        .rating-card .rc-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.65rem;
        }

        .rating-card .rc-user {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }

        .rating-card .rc-email {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        .rating-card .rc-stars {
            font-size: 1rem;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        .rating-card .rc-feedback {
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.55;
            margin-bottom: 0.6rem;
        }

        .rating-card .rc-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
        }

        .star-filled { color: #f59e0b; }
        .star-empty  { color: rgba(255, 255, 255, 0.15); }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.95rem;
        }

        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* ── Stagger entrance ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeSlideUp 0.5s ease forwards;
            opacity: 0;
        }
    </style>
</head>
<body>
    <aside id="sidebar"></aside>

    <main class="main-content" id="main-content">
        <!-- Header -->
        <div class="admin-header animate-in">
            <h1>🔒 Admin Dashboard</h1>
            <p>System overview and user management</p>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="glass-card stat-card animate-in" style="animation-delay:.05s" id="stat-users">
                <span class="stat-icon">👥</span>
                <div class="stat-value" data-count="0">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="glass-card stat-card animate-in" style="animation-delay:.12s" id="stat-scans">
                <span class="stat-icon">📊</span>
                <div class="stat-value" data-count="0">0</div>
                <div class="stat-label">Total Scans</div>
            </div>
            <div class="glass-card stat-card animate-in" style="animation-delay:.19s" id="stat-ratings">
                <span class="stat-icon">⭐</span>
                <div class="stat-value" data-count="0">0</div>
                <div class="stat-label">Total Ratings</div>
            </div>
            <div class="glass-card stat-card animate-in" style="animation-delay:.26s" id="stat-avg-rating">
                <span class="stat-icon">📈</span>
                <div class="stat-value" data-count="0">0</div>
                <div class="stat-label">Avg Rating</div>
            </div>
        </div>

        <!-- Users Section -->
        <section class="animate-in" style="animation-delay:.32s">
            <h2 class="section-title">Users</h2>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="user-search" placeholder="Search by name or email…" autocomplete="off">
            </div>

            <div class="glass-card table-wrapper">
                <table class="data-table" id="users-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Skin Type</th>
                            <th>Hair Type</th>
                            <th>Joined Date</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="7" class="empty-state">
                                <span class="empty-icon">⏳</span>
                                Loading users…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Ratings Section -->
        <section class="animate-in" style="animation-delay:.38s">
            <h2 class="section-title">User Ratings &amp; Feedback</h2>
            <div class="ratings-grid" id="ratings-container">
                <div class="empty-state" style="grid-column:1/-1">
                    <span class="empty-icon">⏳</span>
                    Loading ratings…
                </div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
