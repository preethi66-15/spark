<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      padding-right: 2.75rem;
    }
    .password-toggle {
      position: absolute;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }
    .password-toggle:hover {
      color: var(--text-primary);
    }
    .reset-code-box {
      background: rgba(16, 185, 129, 0.1);
      border: 1px dashed var(--green);
      color: var(--green);
      border-radius: 0.75rem;
      padding: 1rem;
      text-align: center;
      font-family: var(--font-outfit);
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body class="auth-page">

  <!-- Glow Orbs -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <div class="glass-card auth-card animate-slide-up">
    <div class="auth-header">
      <div class="auth-logo"><span class="gradient-text">Spark ✨</span></div>
      <h2 class="auth-title" id="page-title">Reset Password</h2>
      <p class="auth-subtitle" id="page-subtitle">Enter your email to receive a password reset code</p>
    </div>

    <!-- Step 1: Request Reset Code -->
    <form id="forgot-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="📧 e.g., preethi@domain.com" required>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="forgot-submit-btn">
        <span>📧</span> Request Reset Code
      </button>
    </form>

    <!-- Step 2: Reset Password (Hidden Initially) -->
    <form id="reset-form" class="hidden">
      <!-- Info Message presenting code since in this mock database environment we display the generated code in-UI -->
      <div class="reset-code-box" id="reset-code-display">CODE: 000000</div>
      <p style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem;">
        We've generated the reset code above (simulated email delivery). Please input it below along with your new password.
      </p>

      <div class="form-group">
        <label for="reset-code" class="form-label">Reset Code</label>
        <input type="text" id="reset-code" class="form-input" placeholder="🔑 Enter 6-digit code" maxlength="6" required>
      </div>

      <div class="form-group">
        <label for="new-password" class="form-label">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="new-password" class="form-input" placeholder="🔒 Enter new password" minlength="6" required>
          <button type="button" id="password-toggle" class="password-toggle">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-new-password" class="form-label">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm-new-password" class="form-input" placeholder="🔒 Confirm new password" minlength="6" required>
          <button type="button" id="confirm-password-toggle" class="password-toggle">👁️</button>
        </div>
        <div class="form-error hidden" id="password-match-error">Passwords do not match</div>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="reset-submit-btn">
        <span>✅</span> Reset Password
      </button>
    </form>

    <div class="auth-footer">
      Remembered password? <a href="login.html">Login Here</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
